name: Update X Baseball Live

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch X thread
        run: npm run fetch
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          THREAD_ID: ${{ vars.THREAD_ID }}
          AUTHOR_USERNAME: ${{ vars.AUTHOR_USERNAME }}
          INCLUDE_OTHERS: ${{ vars.INCLUDE_OTHERS }}
          MAX_PAGES: 6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
